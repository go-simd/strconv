name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: go vet ./...
      - run: go test -v ./...
      - run: go test -run '^$' -fuzz FuzzParseUint -fuzztime 20s ./...
      - run: go test -run '^$' -fuzz FuzzAtoi -fuzztime 20s ./...
      - run: go test -run '^$' -fuzz FuzzParseInt -fuzztime 20s ./...
      - run: go test -run '^$' -fuzz FuzzParseFloat -fuzztime 20s ./...
      - name: coverage gate (100%)
        run: |
          go test -covermode=atomic -coverprofile=cov.out ./...
          pct=$(go tool cover -func=cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }

  # Emulated cross-arch validation for the architectures that have no native CI
  # runner: the POWER VSX kernel (ppc64le), the z/Architecture vector kernel
  # (s390x), and the generic scalar fallback (riscv64, loong64). Mirrors
  # go-simd/matchlen's emulated job: qemu via binfmt, the test binary
  # cross-compiled and run under a debian:trixie container, with a 100% coverage
  # gate. Fuzzing runs natively on amd64/arm64 (the `test` job above); under qemu
  # we run the cross-compiled test binary, whose table + differential tests
  # validate every kernel against the stdlib bit-for-bit. (Running the Go
  # toolchain itself under TCG emulation to fuzz is too slow/fragile.)
  emulated:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: riscv64, image: "debian:trixie", qemu: "rv64,v=true,vlen=128" }
          - { arch: loong64, image: "ghcr.io/loong64/debian:trixie", qemu: "la464" }
          - { arch: ppc64le, image: "debian:trixie", qemu: "power9" }
          - { arch: s390x,   image: "debian:trixie", qemu: "qemu" }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: docker run --privileged --rm tonistiigi/binfmt --install all
      - name: cross-compile test binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go test -c -cover -o /tmp/t.test .
      - name: run tests under qemu
        run: docker run --rm --platform linux/${{ matrix.arch }} -e QEMU_CPU=${{ matrix.qemu }} -v /tmp:/t ${{ matrix.image }} /t/t.test -test.v -test.coverprofile=/t/cov.out
      - name: coverage gate (100%)
        run: |
          pct=$(go tool cover -func=/tmp/cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }
